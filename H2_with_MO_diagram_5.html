            ctx.beginPath();
            ctx.moveTo(width - atomicOrbitalX - 15, atomicOrbitalY);
            ctx.lineTo(molecularOrbitalX + 20, antibondingY);
            ctx.stroke();
            
            ctx.setLineDash([]);
            
            // Draw electrons as single-barbed arrows (half-arrows)
            // Arrows should pass through the orbital lines, centered on them
            function drawHalfArrow(x, y, pointingUp) {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (pointingUp) {
                    // Vertical line passing through the orbital line
                    ctx.beginPath();
                    ctx.moveTo(x, y + 10);
                    ctx.lineTo(x, y - 10);
                    ctx.stroke();
                    
                    // Half arrowhead (one barb)
                    ctx.beginPath();
                    ctx.moveTo(x, y - 10);
                    ctx.lineTo(x + 3, y - 7);
                    ctx.stroke();
                } else {
                    // Vertical line passing through the orbital line
                    ctx.beginPath();
                    ctx.moveTo(x, y - 10);
                    ctx.lineTo(x, y + 10);
                    ctx.stroke();
                    
                    // Half arrowhead (one barb)
                    ctx.beginPath();
                    ctx.moveTo(x, y + 10);
                    ctx.lineTo(x + 3, y + 7);
                    ctx.stroke();
                }
            }
            
            // Left atomic orbital - 1 electron (up) - centered on line
            drawHalfArrow(atomicOrbitalX, atomicOrbitalY, true);
            
            // Right atomic orbital - 1 electron (up) - centered on line
            drawHalfArrow(width - atomicOrbitalX, atomicOrbitalY, true);
            
            // Bonding orbital - 2 electrons (paired: one up, one down) - centered on line
            drawHalfArrow(molecularOrbitalX - 5, bondingY, true);
            drawHalfArrow(molecularOrbitalX + 5, bondingY, false);
            
            // Labels
            ctx.fillStyle = '#333';
            ctx.font = '11px Arial';
            
            // Atomic orbital labels
            ctx.fillText('H 1s', atomicOrbitalX, atomicOrbitalY + 25);
            ctx.fillText('H 1s', width - atomicOrbitalX, atomicOrbitalY + 25);
            
            // Molecular orbital labels
            ctx.fillStyle = '#333';
            ctx.fillText('σ', molecularOrbitalX, bondingY + 25);
            
            ctx.fillStyle = '#333';
            ctx.fillText('σ*', molecularOrbitalX, antibondingY - 15);
            
            // Distance info at bottom
            ctx.fillStyle = '#666';
            ctx.font = '10px Arial';
            ctx.fillText(`d = ${distance.toFixed(2)} Å`, width / 2, height - 20);
        }
        
        // Initial draw
        drawMODiagram();
        
        // Update MO diagram when distance changes
        const originalInputHandler = distanceSlider.oninput;
        distanceSlider.addEventListener('input', (e) => {
            drawMODiagram();
        });
        
        // Also update on reset
        const originalResetHandler = resetBtn.onclick;
        resetBtn.addEventListener('click', () => {
            setTimeout(drawMODiagram, 0);
        });
    </script>
</body>
</html>
