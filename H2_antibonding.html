                    // Only add face if it has valid vertices
                    if (deformedVerts.length === 3) {
                        const faceIndices = [];
                        for (let i = 0; i < 3; i++) {
                            const vertKey = `${deformedVerts[i][0].toFixed(6)},${deformedVerts[i][1].toFixed(6)},${deformedVerts[i][2].toFixed(6)}`;
                            if (!vertexMap1.has(vertKey)) {
                                vertexMap1.set(vertKey, newIndex1);
                                deformedVertices1.push(deformedVerts[i][0], deformedVerts[i][1], deformedVerts[i][2]);
                                faceIndices.push(newIndex1);
                                newIndex1++;
                            } else {
                                faceIndices.push(vertexMap1.get(vertKey));
                            }
                        }
                        if (faceIndices.length === 3) {
                            deformedFaces1.push(faceIndices[0], faceIndices[1], faceIndices[2]);
                        }
                    }
                }
                
                // Create geometry for deformed orbital 1 (RED)
                const redGeometry1 = new THREE.BufferGeometry();
                const vertices1 = new Float32Array(deformedVertices1);
                redGeometry1.setAttribute('position', new THREE.BufferAttribute(vertices1, 3));
                redGeometry1.setIndex(deformedFaces1);
                redGeometry1.computeVertexNormals();
                
                const redWireframe1 = new THREE.WireframeGeometry(redGeometry1);
                const redMaterial1 = new THREE.LineBasicMaterial({
                    color: 0xff0000,
                    transparent: true,
                    opacity: 0.60
                });
                redOrbital1 = new THREE.LineSegments(redWireframe1, redMaterial1);
                moleculeGroup.add(redOrbital1);
                
                // Create deformed orbital 2 (left side, BLUE)
                const deformedVertices2 = [];
                const deformedFaces2 = [];
                const vertexMap2 = new Map();
                let newIndex2 = 0;
                
                // Center of orbital 2 (at atom position)
                const center2 = -halfDistance;
                
                for (const face of orbitalData.red_mesh.faces) {
                    const v0 = orbitalData.red_mesh.vertices[face[0]];
                    const v1 = orbitalData.red_mesh.vertices[face[1]];
                    const v2 = orbitalData.red_mesh.vertices[face[2]];
                    
                    const verts = [v0, v1, v2];
                    const deformedVerts = [];
                    
                    for (const v of verts) {
                        // Original position in local space (centered at 0)
                        let x = v[0];
                        let y = v[1];
                        let z = v[2];
                        
                        // Only compress vertices on the right side (positive x, facing origin)
                        if (x > 0) {
                            // Only apply compression if we're below the flatten threshold
                            if (normalizedDist > 0) {
                                // Use a power curve to make compression more gradual at the start
                                // Square the normalized distance to make it even more gradual
                                const compressionCurve = Math.pow(normalizedDist, 2);
                                
                                // At compressionCurve = 0: no compression (factor = 1.0)
                                // At compressionCurve = 1: maximum compression (factor = maxCompressionFactor)
                                const compressionFactor = 1.0 - (compressionCurve * (1.0 - maxCompressionFactor));
                                x = x * compressionFactor;
                            }
                        }
                        // Vertices with x <= 0 (outer hemisphere) remain unchanged
                        
                        // Transform to world position
                        const worldX = x + center2;
                        const worldY = y;
                        const worldZ = z;
                        
                        // Create buffer zone for the node (0.03 Å from x = 0)
                        const nodeBuffer = 0.03;
                        
                        // Only clip at nodal plane when orbitals are close (below threshold)
                        if (distance < flattenThreshold && worldX > -nodeBuffer) {
                            // Project to nodal plane with buffer for antibonding
                            deformedVerts.push([-nodeBuffer, worldY, worldZ]);
                        } else {
                            deformedVerts.push([worldX, worldY, worldZ]);
                        }
                    }
                    
                    // Only add face if it has valid vertices
                    if (deformedVerts.length === 3) {
                        const faceIndices = [];
                        for (let i = 0; i < 3; i++) {
                            const vertKey = `${deformedVerts[i][0].toFixed(6)},${deformedVerts[i][1].toFixed(6)},${deformedVerts[i][2].toFixed(6)}`;
                            if (!vertexMap2.has(vertKey)) {
                                vertexMap2.set(vertKey, newIndex2);
                                deformedVertices2.push(deformedVerts[i][0], deformedVerts[i][1], deformedVerts[i][2]);
                                faceIndices.push(newIndex2);
                                newIndex2++;
                            } else {
                                faceIndices.push(vertexMap2.get(vertKey));
                            }
                        }
                        if (faceIndices.length === 3) {
                            deformedFaces2.push(faceIndices[0], faceIndices[1], faceIndices[2]);
                        }
                    }
                }
                
                // Create geometry for deformed orbital 2 (BLUE)
                const blueGeometry2 = new THREE.BufferGeometry();
                const vertices2 = new Float32Array(deformedVertices2);
                blueGeometry2.setAttribute('position', new THREE.BufferAttribute(vertices2, 3));
                blueGeometry2.setIndex(deformedFaces2);
                blueGeometry2.computeVertexNormals();
                
                const blueWireframe2 = new THREE.WireframeGeometry(blueGeometry2);
                const blueMaterial2 = new THREE.LineBasicMaterial({
                    color: 0x0000ff,
                    transparent: true,
                    opacity: 0.60
                });
                redOrbital2 = new THREE.LineSegments(blueWireframe2, blueMaterial2);
                moleculeGroup.add(redOrbital2);
            }
        }

        function setupMouseControls() {
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function resetAll() {
            // Reset slider
            const slider = document.getElementById('distanceSlider');
            const distanceValue = document.getElementById('distanceValue');
            slider.value = initialDistance;
            distanceValue.textContent = initialDistance.toFixed(2) + ' Å';
            
            // Reset atom and orbital positions
            updateDistance(initialDistance);
            
            // Reset camera and molecule rotation
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
