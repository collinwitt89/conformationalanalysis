            const positions = [
                {x: -2.5, orbital: 'left'},   // X-aligned
                {x: 0.5, orbital: 'middle'},    // Y-aligned
                {x: 2.5, orbital: 'right'}    // Z-aligned
            ];
            
            positions.forEach(pos => {
                // Create carbon atom
                const atom = new THREE.Mesh(atomGeometry, atomMaterial);
                atom.position.set(pos.x, 0, 0);
                moleculeGroup.add(atom);

                const currentOrbital = orbitalsData[pos.orbital];

                // Create red orbital mesh
                if (currentOrbital.red_mesh.vertices.length > 0) {
                    const redGeometry = new THREE.BufferGeometry();
                    const vertices = [];
                    for (const vertex of currentOrbital.red_mesh.vertices) {
                        vertices.push(vertex[0] + pos.x, vertex[1], vertex[2]);
                    }
                    redGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                    
                    const indices = [];
                    for (const face of currentOrbital.red_mesh.faces) {
                        indices.push(face[0], face[1], face[2]);
                    }
                    redGeometry.setIndex(indices);
                    redGeometry.computeVertexNormals();
                    
                    const redWireframe = new THREE.WireframeGeometry(redGeometry);
                    const redOrbital = new THREE.LineSegments(redWireframe, redMaterial);
                    moleculeGroup.add(redOrbital);
                }

                // Create blue orbital mesh
                if (currentOrbital.blue_mesh.vertices.length > 0) {
                    const blueGeometry = new THREE.BufferGeometry();
                    const vertices = [];
                    for (const vertex of currentOrbital.blue_mesh.vertices) {
                        vertices.push(vertex[0] + pos.x, vertex[1], vertex[2]);
                    }
                    blueGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                    
                    const indices = [];
                    for (const face of currentOrbital.blue_mesh.faces) {
                        indices.push(face[0], face[1], face[2]);
                    }
                    blueGeometry.setIndex(indices);
                    blueGeometry.computeVertexNormals();
                    
                    const blueWireframe = new THREE.WireframeGeometry(blueGeometry);
                    const blueOrbital = new THREE.LineSegments(blueWireframe, blueMaterial);
                    moleculeGroup.add(blueOrbital);
                }
            });

            // Create axis legend in bottom-left
            axesGroup = new THREE.Group();
            scene.add(axesGroup);  // Add to scene directly, not moleculeGroup
            
            // Fixed position in bottom-left
            const axesOffset = new THREE.Vector3(-4.5, -2.5, 0);
            
            const axisLength = 1.2;
            const arrowHeadLength = 0.25;
            const arrowHeadWidth = 0.15;
            
            // X axis (red)
            const xAxis = new THREE.ArrowHelper(
                new THREE.Vector3(1, 0, 0),
                axesOffset,
                axisLength,
                0xff0000,
                arrowHeadLength,
                arrowHeadWidth
            );
            axesGroup.add(xAxis);
            
            // Y axis (green)
            const yAxis = new THREE.ArrowHelper(
                new THREE.Vector3(0, 1, 0),
                axesOffset,
                axisLength,
                0x00ff00,
                arrowHeadLength,
                arrowHeadWidth
            );
            axesGroup.add(yAxis);
            
            // Z axis (blue)
            const zAxis = new THREE.ArrowHelper(
                new THREE.Vector3(0, 0, 1),
                axesOffset,
                axisLength,
                0x0000ff,
                arrowHeadLength,
                arrowHeadWidth
            );
            axesGroup.add(zAxis);
            
            // Create labels using canvas textures
            function createTextLabel(text, color) {
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color;
                ctx.font = 'bold 56px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, 32, 32);
                
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(0.5, 0.5, 1);
                return sprite;
            }
            
            const xLabel = createTextLabel('x', '#ff0000');
            xLabel.position.copy(axesOffset).add(new THREE.Vector3(axisLength + 0.2, 0, 0));
            axesGroup.add(xLabel);
            
            const yLabel = createTextLabel('y', '#00ff00');
            yLabel.position.copy(axesOffset).add(new THREE.Vector3(0, axisLength + 0.2, 0));
            axesGroup.add(yLabel);
            
            const zLabel = createTextLabel('z', '#0000ff');
            zLabel.position.copy(axesOffset).add(new THREE.Vector3(0, 0, axisLength + 0.2));
            axesGroup.add(zLabel);


            // Mouse interaction
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            // Zoom
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            animate();
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Sync axes rotation with molecule rotation
            axesGroup.rotation.copy(moleculeGroup.rotation);
            renderer.render(scene, camera);
        }

        init();
    </script>
