            const directionalLight3 = new THREE.DirectionalLight(0xffffff, 0.2);
            directionalLight3.position.set(0, -5, 0);
            scene.add(directionalLight3);

            createMolecule();
            createOrbitals();

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            animate();
        }

        function createMolecule() {
            const atomProps = {
                'C': { radius: 0.42, color: 0x606060 },
                'O': { radius: 0.36, color: 0xff0d0d },
                'H': { radius: 0.30, color: 0xe8e8e8 }
            };
            
            moleculeData.atoms.forEach(atom => {
                const props = atomProps[atom.element];
                const geometry = new THREE.SphereGeometry(props.radius, 32, 32);
                const material = new THREE.MeshPhongMaterial({ 
                    color: props.color,
                    shininess: 30
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(atom.x, atom.y, atom.z);
                moleculeGroup.add(sphere);
            });
            
            const bondRadius = 0.08;
            moleculeData.bonds.forEach(bond => {
                const atom1 = moleculeData.atoms.find(a => a.id === bond.atom1);
                const atom2 = moleculeData.atoms.find(a => a.id === bond.atom2);
                
                const start = new THREE.Vector3(atom1.x, atom1.y, atom1.z);
                const end = new THREE.Vector3(atom2.x, atom2.y, atom2.z);
                const direction = new THREE.Vector3().subVectors(end, start);
                const length = direction.length();
                
                const geometry = new THREE.CylinderGeometry(bondRadius, bondRadius, length, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x606060,
                    shininess: 30
                });
                const cylinder = new THREE.Mesh(geometry, material);
                
                cylinder.position.copy(start).add(direction.multiplyScalar(0.5));
                cylinder.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0),
                    direction.clone().normalize()
                );
                
                moleculeGroup.add(cylinder);
            });
        }

        function createOrbitals() {
            const redMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const blueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });

            // Lobe 1: Carbon blue
            createLobe(
                sp3OriginalData.blue_mesh, 
                blueMaterial, 
                carbonPos[0], carbonPos[1], carbonPos[2],
                -1, lobe1Stretch, lobe1Size, null
            );

            // Lobe 2: Carbon red
            createLobe(
                sp3OriginalData.red_mesh, 
                redMaterial, 
                carbonPos[0], carbonPos[1], carbonPos[2],
                -1, lobe2Stretch, lobe2Size, lobe2Fan
            );

            // Lobe 3: Oxygen blue
            createLobe(
                sp3OriginalData.red_mesh, 
                blueMaterial,
                oxygenPos[0], oxygenPos[1], oxygenPos[2],
                1, lobe3Stretch, lobe3Size, lobe3Fan
            );

            // Lobe 4: Oxygen red
            createLobe(
                sp3OriginalData.blue_mesh, 
                redMaterial,
                oxygenPos[0], oxygenPos[1], oxygenPos[2],
                1, lobe4Stretch, lobe4Size, null
            );
        }

        function createLobe(meshData, material, offsetX, offsetY, offsetZ, xFlip, stretch, size, fan) {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            
            const xValues = meshData.vertices.map(v => v[0]);
            const maxX = Math.max(...xValues);
            const minX = Math.min(...xValues);
            
            for (let i = 0; i < meshData.vertices.length; i++) {
                const [x, y, z] = meshData.vertices[i];
                
                let yzScale = size;
                
                if (fan !== null) {
                    const normalizedPos = (x - minX) / (maxX - minX);
                    yzScale = size * (1.0 + (fan - 1.0) * normalizedPos);
                }
                
                const newX = (x * stretch * xFlip) + offsetX;
                const newY = (y * yzScale) + offsetY;
                const newZ = (z * yzScale) + offsetZ;
                vertices.push(newX, newY, newZ);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            
            const indices = [];
            for (const face of meshData.faces) {
                indices.push(face[0], face[1], face[2]);
            }
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            
            const wireframe = new THREE.WireframeGeometry(geometry);
            const mesh = new THREE.LineSegments(wireframe, material);
            moleculeGroup.add(mesh);
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
