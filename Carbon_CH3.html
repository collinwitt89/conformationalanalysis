            directionalLight1.position.set(5, 5, 5);
            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-5, -5, -5);
            scene.add(directionalLight2);
            
            const directionalLight3 = new THREE.DirectionalLight(0xffffff, 0.2);
            directionalLight3.position.set(0, -5, 0);
            scene.add(directionalLight3);
            
            const redMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const blueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });

            // Create carbon s orbitals
            createOrbitalMesh(sOrbitalData.red_mesh, sRedScale, redMaterial, 0, 0, 0, 's');
            createOrbitalMesh(sOrbitalData.red_mesh, sBlueScale, blueMaterial, 0, 0, 0, 's');
            
            // Create carbon p orbitals
            createOrbitalMesh(pxOrbitalData.red_mesh, 1.0, redMaterial, 0, 0, 0, 'p');
            createOrbitalMesh(pxOrbitalData.blue_mesh, 1.0, blueMaterial, 0, 0, 0, 'p');
            createOrbitalMesh(pyOrbitalData.red_mesh, 1.0, redMaterial, 0, 0, 0, 'p');
            createOrbitalMesh(pyOrbitalData.blue_mesh, 1.0, blueMaterial, 0, 0, 0, 'p');
            createOrbitalMesh(pzOrbitalData.red_mesh, 1.0, redMaterial, 0, 0, 0, 'p');
            createOrbitalMesh(pzOrbitalData.blue_mesh, 1.0, blueMaterial, 0, 0, 0, 'p');
            
            // Create H 1s orbitals
            // Identify which hydrogens are p-type (aligned with axes) vs s-type (diagonal)
            hPositions.forEach((hAtom, index) => {
                const x = Math.abs(hAtom.x);
                const y = Math.abs(hAtom.y);
                const z = Math.abs(hAtom.z);
                const nearZeroCount = [x, y, z].filter(coord => coord < 0.1).length;
                
                // If 2+ coordinates are near zero, it's aligned with an axis (p-type)
                const type = nearZeroCount >= 2 ? 'p' : 's';
                createOrbitalMesh(hOrbitalData.red_mesh, 1.0, redMaterial, hAtom.x, hAtom.y, hAtom.z, type);
            });
            
            // Create molecule
            const atomProps = {
                'C': { radius: 0.42, color: 0x606060 },
                'H': { radius: 0.30, color: 0xe8e8e8 }
            };
            
            moleculeData.atoms.forEach(atom => {
                const props = atomProps[atom.element];
                const geometry = new THREE.SphereGeometry(props.radius, 32, 32);
                const material = new THREE.MeshPhongMaterial({ 
                    color: props.color,
                    shininess: 30
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(atom.x, atom.y, atom.z);
                moleculeGroup.add(sphere);
            });
            
            const bondRadius = 0.08;
            moleculeData.bonds.forEach(bond => {
                const atom1 = moleculeData.atoms.find(a => a.id === bond.atom1);
                const atom2 = moleculeData.atoms.find(a => a.id === bond.atom2);
                
                const start = new THREE.Vector3(atom1.x, atom1.y, atom1.z);
                const end = new THREE.Vector3(atom2.x, atom2.y, atom2.z);
                const direction = new THREE.Vector3().subVectors(end, start);
                const length = direction.length();
                
                const geometry = new THREE.CylinderGeometry(bondRadius, bondRadius, length, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x606060,
                    shininess: 30
                });
                const cylinder = new THREE.Mesh(geometry, material);
                
                cylinder.position.copy(start).add(direction.multiplyScalar(0.5));
                cylinder.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0),
                    direction.clone().normalize()
                );
                
                moleculeGroup.add(cylinder);
            });

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            animate();
        }

        function createOrbitalMesh(meshData, scale, material, offsetX, offsetY, offsetZ, orbitalType) {
            if (meshData.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                
                for (let i = 0; i < meshData.vertices.length; i++) {
                    const [x, y, z] = meshData.vertices[i];
                    vertices.push(x * scale + offsetX, y * scale + offsetY, z * scale + offsetZ);
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                
                const indices = [];
                for (const face of meshData.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                const mesh = new THREE.LineSegments(wireframe, material);
                moleculeGroup.add(mesh);
                
                // Categorize the mesh
                if (orbitalType === 's') {
                    sOrbitalMeshes.push(mesh);
                } else if (orbitalType === 'p') {
                    pOrbitalMeshes.push(mesh);
                }
            }
        }

        function toggleS() {
            showS = !showS;
            const button = document.getElementById('toggle-s');
            
            sOrbitalMeshes.forEach(mesh => {
                mesh.visible = showS;
            });
            
            if (showS) {
                button.classList.remove('inactive');
                button.classList.add('active');
            } else {
                button.classList.remove('active');
                button.classList.add('inactive');
            }
        }

        function toggleP() {
            showP = !showP;
            const button = document.getElementById('toggle-p');
            
            pOrbitalMeshes.forEach(mesh => {
                mesh.visible = showP;
            });
            
            if (showP) {
                button.classList.remove('inactive');
                button.classList.add('active');
            } else {
                button.classList.remove('active');
                button.classList.add('inactive');
            }
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
