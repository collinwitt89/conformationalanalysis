        function createCH2Molecule(xPosition) {
            // Carbon atom at xPosition
            const carbonGeometry = new THREE.SphereGeometry(0.42, 32, 32);
            const carbonMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x606060,
                shininess: 30
            });
            const carbon = new THREE.Mesh(carbonGeometry, carbonMaterial);
            carbon.position.set(xPosition, 0, 0);
            moleculeGroup.add(carbon);

            // CH2 has two hydrogens in XZ plane
            // They should point AWAY from origin
            // Left molecule (xPosition < 0): hydrogens point MORE negative in X (further left)
            // Right molecule (xPosition > 0): hydrogens point MORE positive in X (further right)
            
            const bondLength = 1.07; // Typical C-H bond
            const angle = 54; // Angle from X-axis in degrees
            const angleRad = angle * Math.PI / 180;
            
            // direction: 1 for left side, -1 for right side
            // We want: if xPosition = -2.5, H points MORE negative (left)
            //          if xPosition = +2.5, H points MORE positive (right)
            // So the sign should match the sign of xPosition
            const dirSign = xPosition > 0 ? 1 : -1;
            
            const h1X = xPosition + (dirSign * bondLength * Math.cos(angleRad));
            const h1Z = bondLength * Math.sin(angleRad);
            
            const h2X = xPosition + (dirSign * bondLength * Math.cos(angleRad));
            const h2Z = -bondLength * Math.sin(angleRad);

            // Hydrogen atoms
            const hydrogenGeometry = new THREE.SphereGeometry(0.30, 32, 32);
            const hydrogenMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xe8e8e8,
                shininess: 30
            });
            
            const hydrogen1 = new THREE.Mesh(hydrogenGeometry, hydrogenMaterial);
            hydrogen1.position.set(h1X, 0, h1Z);
            moleculeGroup.add(hydrogen1);
            
            const hydrogen2 = new THREE.Mesh(hydrogenGeometry, hydrogenMaterial);
            hydrogen2.position.set(h2X, 0, h2Z);
            moleculeGroup.add(hydrogen2);

            // Bonds
            const bondRadius = 0.08;
            const bondMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x606060,
                shininess: 30
            });

            createBond(carbon.position, hydrogen1.position, bondRadius, bondMaterial);
            createBond(carbon.position, hydrogen2.position, bondRadius, bondMaterial);
        }

        function createBond(start, end, radius, material) {
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 16);
            const bond = new THREE.Mesh(geometry, material);
            
            bond.position.copy(start).add(direction.multiplyScalar(0.5));
            
            const axis = new THREE.Vector3(0, 1, 0);
            bond.quaternion.setFromUnitVectors(axis, direction.clone().normalize());
            
            moleculeGroup.add(bond);
        }

                        const effectCurve = Math.pow(normalizedDist, 1.5);
                        const isInnerLobe = (x < 0);
                        
                        if (isInnerLobe) {
                            const dynamicEffect = effectCurve * stretchFactor;
                            const finalFactor = 1.0 + dynamicEffect;
                            x = x * finalFactor;
                        }
                    }
                    
                    vertexIndexMap.set(i, newVertices.length / 3);
                    newVertices.push(x, y, z);
                }
                
                if (newVertices.length === 0) return null;
                
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(newVertices), 3));
                
                // Rebuild faces
                const indices = [];
                for (const face of meshData.faces) {
                    const [i0, i1, i2] = face;
                    if (vertexIndexMap.has(i0) && vertexIndexMap.has(i1) && vertexIndexMap.has(i2)) {
                        indices.push(
                            vertexIndexMap.get(i0),
                            vertexIndexMap.get(i1),
                            vertexIndexMap.get(i2)
                        );
                    }
                }
                
                if (indices.length === 0) return null;
                
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                return geometry;
            }
            
            // Right carbon group (at +halfDist)
            const rightGroup = new THREE.Group();
            rightGroup.position.x = halfDist;
            
            const redGeomRight = createDeformedOrbital(orbData.red_mesh, true);
            if (redGeomRight) {
                const wireframe = new THREE.WireframeGeometry(redGeomRight);
                const mesh = new THREE.LineSegments(wireframe, redMaterial);
                rightGroup.add(mesh);
            }
            
            const blueGeomRight = createDeformedOrbital(orbData.blue_mesh, false);
            if (blueGeomRight) {
                const wireframe = new THREE.WireframeGeometry(blueGeomRight);
                const mesh = new THREE.LineSegments(wireframe, blueMaterial);
                rightGroup.add(mesh);
            }
            
            moleculeGroup.add(rightGroup);
            orbitalMeshes.push(rightGroup);
            
            // Left carbon group (at -halfDist), rotated 180°
            const leftGroup = new THREE.Group();
            leftGroup.position.x = -halfDist;
            leftGroup.rotation.y = Math.PI;
            
            const redGeomLeft = createDeformedOrbital(orbData.red_mesh, true);
            if (redGeomLeft) {
                const wireframe = new THREE.WireframeGeometry(redGeomLeft);
                const mesh = new THREE.LineSegments(wireframe, redMaterial);
                leftGroup.add(mesh);
            }
            
            const blueGeomLeft = createDeformedOrbital(orbData.blue_mesh, false);
            if (blueGeomLeft) {
                const wireframe = new THREE.WireframeGeometry(blueGeomLeft);
                const mesh = new THREE.LineSegments(wireframe, blueMaterial);
                leftGroup.add(mesh);
            }
            
            moleculeGroup.add(leftGroup);
            orbitalMeshes.push(leftGroup);
        }

        function createPiOrbitals() {
            if (!piVisible) return;
            
            const distance = currentDistance;
            const halfDist = distance / 2;
            
            const stretchThreshold = 2.50;
            const minDistance = 1.34;
            const orbitalRadius = 0.75;
            
            // Calculate normalized distance
            let normalizedDist = 0;
            if (distance < stretchThreshold) {
                normalizedDist = Math.max(0, Math.min(1, 
                    (stretchThreshold - distance) / (stretchThreshold - minDistance)));
            }
            
            // Materials
            const redMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const blueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });
            
            // Helper to create pi orbital with Y-stretching and clipping
            function createPiOrbital(meshData, carbonPosition, color) {
                if (meshData.vertices.length === 0) return null;
                
                const geometry = new THREE.BufferGeometry();
                const newVertices = [];
                const vertexIndexMap = new Map();
                
                const isRightCarbon = carbonPosition > 0;
                
                for (let i = 0; i < meshData.vertices.length; i++) {
                    let [x, y, z] = meshData.vertices[i];
                    
                    // Stretch inner hemisphere along Y
                    // With 90° rotation (vs original 270°), Y direction is flipped
                    let shouldStretch = false;
                    if (isRightCarbon) {
                        shouldStretch = (y > 0); // Inner hemisphere (toward origin)
                    } else {
                        shouldStretch = (y < 0); // Inner hemisphere (toward origin)
                    }
                    
                    if (distance < stretchThreshold && shouldStretch) {
                        const stretchCurve = Math.pow(normalizedDist, 1.5);
                        const stretchFac = 1.0 + (stretchCurve * (piStretchFactor - 1.0));
                        y = y * stretchFac;
                    }
                    
                    // Transform to world coordinates (90° Z rotation)
                    const worldX = -y + carbonPosition;
                    const worldY = x;
                    const otherCarbonPos = -carbonPosition;
                    
                    // Sphere clipping
                    const distToOther = Math.sqrt(
                        Math.pow(worldX - otherCarbonPos, 2) + 
                        Math.pow(worldY, 2) + 
                        Math.pow(z, 2)
                    );
                    
                    if (distToOther > orbitalRadius) {
                        vertexIndexMap.set(i, newVertices.length / 3);
                        newVertices.push(x, y, z);
                    }
                }
                
                if (newVertices.length === 0) return null;
                
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(newVertices), 3));
                
                const indices = [];
                for (const face of meshData.faces) {
                    const [i0, i1, i2] = face;
                    if (vertexIndexMap.has(i0) && vertexIndexMap.has(i1) && vertexIndexMap.has(i2)) {
                        indices.push(
                            vertexIndexMap.get(i0),
                            vertexIndexMap.get(i1),
                            vertexIndexMap.get(i2)
                        );
                    }
                }
                
                if (indices.length === 0) return null;
                
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                return geometry;
            }
            
            // Right carbon pi orbital
            const rightPiGroup = new THREE.Group();
            rightPiGroup.position.x = halfDist;
            rightPiGroup.rotation.z = Math.PI / 2; // 90° rotation - red up, blue down
            
            const redGeomRight = createPiOrbital(piOrbitalData.red_mesh, halfDist, 0xff0000);
            if (redGeomRight) {
                const wireframe = new THREE.WireframeGeometry(redGeomRight);
                const mesh = new THREE.LineSegments(wireframe, redMaterial);
                rightPiGroup.add(mesh);
            }
            
            const blueGeomRight = createPiOrbital(piOrbitalData.blue_mesh, halfDist, 0x0000ff);
            if (blueGeomRight) {
                const wireframe = new THREE.WireframeGeometry(blueGeomRight);
                const mesh = new THREE.LineSegments(wireframe, blueMaterial);
                rightPiGroup.add(mesh);
            }
            
            moleculeGroup.add(rightPiGroup);
            orbitalMeshes.push(rightPiGroup);
            
            // Left carbon pi orbital
            const leftPiGroup = new THREE.Group();
            leftPiGroup.position.x = -halfDist;
            leftPiGroup.rotation.z = Math.PI / 2; // 90° rotation - red up, blue down
            
            const redGeomLeft = createPiOrbital(piOrbitalData.red_mesh, -halfDist, 0xff0000);
            if (redGeomLeft) {
                const wireframe = new THREE.WireframeGeometry(redGeomLeft);
                const mesh = new THREE.LineSegments(wireframe, redMaterial);
                leftPiGroup.add(mesh);
            }
            
            const blueGeomLeft = createPiOrbital(piOrbitalData.blue_mesh, -halfDist, 0x0000ff);
            if (blueGeomLeft) {
                const wireframe = new THREE.WireframeGeometry(blueGeomLeft);
                const mesh = new THREE.LineSegments(wireframe, blueMaterial);
                leftPiGroup.add(mesh);
            }
            
            moleculeGroup.add(leftPiGroup);
            orbitalMeshes.push(leftPiGroup);
        }

        function setupMouseControls() {
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;

                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;

                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function resetAll() {
            resetCamera();
            currentDistance = initialDistance;
            document.getElementById('distanceSlider').value = initialDistance;
            document.getElementById('distanceValue').textContent = initialDistance.toFixed(2) + ' Å';
            updateMoleculePositions();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
