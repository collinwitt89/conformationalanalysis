<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Difluoro Molecule with Dipole</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        #container {
            width: 338px;
            height: 330px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .controls-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 0px;
            border: 1px solid #cccccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 100;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="range"] {
            width: 150px;
            height: 3px;
            border-radius: 0px;
            background: #d0d0d0;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #000000;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #000000;
            cursor: pointer;
            border: none;
        }
        .angle-display {
            font-size: 12px;
            color: #404040;
            min-width: 35px;
            text-align: right;
        }
        .reset-btn {
            padding: 4px 8px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 0px;
            cursor: pointer;
            font-size: 14px;
        }
        .reset-btn:hover {
            background: #333333;
        }
        .dipole-display {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 12px;
            color: #404040;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="dipole-display" id="dipole-display">μ: 1.00</div>
        <div class="controls-bar">
            <div class="slider-container">
                <input type="range" id="dihedral-slider" min="0" max="360" step="1" value="0">
                <span class="angle-display" id="angle-display">0°</span>
            </div>
            <button class="reset-btn" onclick="resetCamera()">⌖</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, moleculeGroup;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let initialCameraPos, initialMoleculeRot;
        let dihedralAngle = 0;
        let dipoleArrow;
        let maxDipoleMagnitude = 2.0; // Maximum when both dipoles aligned

        const originalMoleculeData = {"atoms": [{"id": 1, "element": "C", "x": -2.5227, "y": -0.833364705882353, "z": 0.03359999999999999}, {"id": 2, "element": "C", "x": -1.275, "y": 0.030335294117647127, "z": -0.1355}, {"id": 3, "element": "H", "x": -2.5207, "y": -1.663964705882353, "z": -0.7041000000000001}, {"id": 4, "element": "H", "x": -3.4305999999999996, "y": -0.21576470588235291, "z": -0.13240000000000002}, {"id": 5, "element": "H", "x": -2.5635, "y": -1.2579647058823529, "z": 1.0594000000000001}, {"id": 6, "element": "C", "x": -0.0, "y": -0.8007647058823529, "z": 0.07809999999999999}, {"id": 7, "element": "F", "x": -1.327, "y": 1.072335294117647, "z": 0.7749999999999999}, {"id": 8, "element": "H", "x": -1.2737000000000003, "y": 0.4517352941176469, "z": -1.1644999999999999}, {"id": 9, "element": "C", "x": 1.275, "y": 0.030335294117647127, "z": -0.1356}, {"id": 10, "element": "H", "x": -0.0, "y": -1.6430647058823529, "z": -0.649}, {"id": 11, "element": "H", "x": -0.0, "y": -1.222764705882353, "z": 1.1076000000000001}, {"id": 12, "element": "C", "x": 2.5227, "y": -0.833364705882353, "z": 0.03359999999999999}, {"id": 13, "element": "F", "x": 1.327, "y": 1.072235294117647, "z": 0.7751}, {"id": 14, "element": "H", "x": 1.2736999999999998, "y": 0.4518352941176469, "z": -1.1644999999999999}, {"id": 15, "element": "H", "x": 2.5635, "y": -1.258064705882353, "z": 1.0595}, {"id": 16, "element": "H", "x": 3.4306, "y": -0.21576470588235291, "z": -0.1323}, {"id": 17, "element": "H", "x": 2.5207, "y": -1.663964705882353, "z": -0.7040000000000001}], "bonds": [{"atom1": 1, "atom2": 2, "type": 1}, {"atom1": 1, "atom2": 3, "type": 1}, {"atom1": 1, "atom2": 4, "type": 1}, {"atom1": 1, "atom2": 5, "type": 1}, {"atom1": 2, "atom2": 6, "type": 1}, {"atom1": 2, "atom2": 7, "type": 1}, {"atom1": 2, "atom2": 8, "type": 1}, {"atom1": 6, "atom2": 9, "type": 1}, {"atom1": 6, "atom2": 10, "type": 1}, {"atom1": 6, "atom2": 11, "type": 1}, {"atom1": 9, "atom2": 12, "type": 1}, {"atom1": 9, "atom2": 13, "type": 1}, {"atom1": 9, "atom2": 14, "type": 1}, {"atom1": 12, "atom2": 15, "type": 1}, {"atom1": 12, "atom2": 16, "type": 1}, {"atom1": 12, "atom2": 17, "type": 1}]};
        const rotationInfo = {"c3_id": 6, "c4_id": 9, "c3_pos": [-0.0, -0.8007647058823529, 0.07809999999999999], "c4_pos": [1.275, 0.030335294117647127, -0.1356], "rotating_ids": [9, 12, 13, 14, 15, 16, 17]};
        const dipoleInfo = {"f_rotating_id": 13, "f_stationary_id": 7};

        function init() {
            const container = document.getElementById('container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            
            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, -0.3, 11);
            camera.lookAt(0, 0, 0);
            initialCameraPos = camera.position.clone();
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            moleculeGroup = new THREE.Group();
            scene.add(moleculeGroup);
            initialMoleculeRot = moleculeGroup.rotation.clone();
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight1.position.set(5, 5, 5);
            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-5, -5, -5);
            scene.add(directionalLight2);
            
            const directionalLight3 = new THREE.DirectionalLight(0xffffff, 0.2);
            directionalLight3.position.set(0, -5, 0);
            scene.add(directionalLight3);

            createMolecule();
            updateDipoleArrow();

            const slider = document.getElementById('dihedral-slider');
            const angleDisplay = document.getElementById('angle-display');
            
            slider.addEventListener('input', (e) => {
                dihedralAngle = parseFloat(e.target.value);
                angleDisplay.textContent = Math.round(dihedralAngle) + '°';
                updateMolecule();
                updateDipoleArrow();
            });

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            animate();
        }

        function createMolecule() {
            while(moleculeGroup.children.length > 0) {
                moleculeGroup.remove(moleculeGroup.children[0]);
            }

            const currentAtoms = getCurrentAtomPositions();

            const atomProps = {
                'C': { radius: 0.42, color: 0x606060 },
                'H': { radius: 0.30, color: 0xe8e8e8 },
                'F': { radius: 0.36, color: 0x90e050 }
            };
            
            currentAtoms.forEach(atom => {
                const props = atomProps[atom.element];
                const geometry = new THREE.SphereGeometry(props.radius, 32, 32);
                const material = new THREE.MeshPhongMaterial({ 
                    color: props.color,
                    shininess: 30
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(atom.x, atom.y, atom.z);
                moleculeGroup.add(sphere);
            });
            
            const bondRadius = 0.08;
            originalMoleculeData.bonds.forEach(bond => {
                const atom1 = currentAtoms.find(a => a.id === bond.atom1);
                const atom2 = currentAtoms.find(a => a.id === bond.atom2);
                
                const start = new THREE.Vector3(atom1.x, atom1.y, atom1.z);
                const end = new THREE.Vector3(atom2.x, atom2.y, atom2.z);
                const direction = new THREE.Vector3().subVectors(end, start);
                const length = direction.length();
                
                const geometry = new THREE.CylinderGeometry(bondRadius, bondRadius, length, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x606060,
                    shininess: 30
                });
                const cylinder = new THREE.Mesh(geometry, material);
                
                cylinder.position.copy(start).add(direction.multiplyScalar(0.5));
                cylinder.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0),
                    direction.clone().normalize()
                );
                
                moleculeGroup.add(cylinder);
            });
        }

        function getCurrentAtomPositions() {
            const atoms = JSON.parse(JSON.stringify(originalMoleculeData.atoms));
            
            const c3Pos = new THREE.Vector3(...rotationInfo.c3_pos);
            const c4Pos = new THREE.Vector3(...rotationInfo.c4_pos);
            const bondAxis = new THREE.Vector3().subVectors(c4Pos, c3Pos).normalize();
            
            const angleRad = (dihedralAngle * Math.PI) / 180;
            
            atoms.forEach(atom => {
                if (rotationInfo.rotating_ids.includes(atom.id)) {
                    const pos = new THREE.Vector3(atom.x, atom.y, atom.z);
                    pos.sub(c3Pos);
                    pos.applyAxisAngle(bondAxis, angleRad);
                    pos.add(c3Pos);
                    
                    atom.x = pos.x;
                    atom.y = pos.y;
                    atom.z = pos.z;
                }
            });
            
            return atoms;
        }

        function calculateDipole() {
            const currentAtoms = getCurrentAtomPositions();
            
            const fStationary = currentAtoms.find(a => a.id === dipoleInfo.f_stationary_id);
            const fRotating = currentAtoms.find(a => a.id === dipoleInfo.f_rotating_id);
            
            const carbonStationary = currentAtoms.find(a => a.id === 2);
            const carbonRotating = currentAtoms.find(a => a.id === 9);
            
            const dipole1 = new THREE.Vector3(
                fStationary.x - carbonStationary.x,
                fStationary.y - carbonStationary.y,
                fStationary.z - carbonStationary.z
            ).normalize();
            
            const dipole2 = new THREE.Vector3(
                fRotating.x - carbonRotating.x,
                fRotating.y - carbonRotating.y,
                fRotating.z - carbonRotating.z
            ).normalize();
            
            const totalDipole = new THREE.Vector3().addVectors(dipole1, dipole2);
            
            return totalDipole;
        }

        function updateDipoleArrow() {
            if (dipoleArrow) {
                moleculeGroup.remove(dipoleArrow);
            }
            
            const dipole = calculateDipole();
            const magnitude = dipole.length();
            
            // Update display value (normalized to max = 1.00)
            const relativeDipole = magnitude / maxDipoleMagnitude;
            document.getElementById('dipole-display').textContent = 'μ: ' + relativeDipole.toFixed(2);
            
            if (magnitude < 0.01) {
                return;
            }
            
            // Create custom dipole arrow with cross at base
            dipoleArrow = new THREE.Group();
            
            // Repositioned: shifted down and to the left
            const arrowOrigin = new THREE.Vector3(0, 2.5, 0);
            const arrowDir = dipole.clone().normalize();
            const arrowLength = magnitude * 0.75;
            
            const arrowColor = 0xe74c3c;
            
            // Arrow shaft (thicker cylinder)
            const shaftRadius = 0.04;
            const shaftLength = arrowLength * 0.7;
            const shaftGeometry = new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLength, 8);
            const shaftMaterial = new THREE.MeshBasicMaterial({ color: arrowColor });
            const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);
            
            shaft.position.copy(arrowOrigin).add(arrowDir.clone().multiplyScalar(shaftLength / 2));
            shaft.quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 1, 0),
                arrowDir
            );
            dipoleArrow.add(shaft);
            
            // Arrow head (cone)
            const headLength = arrowLength * 0.3;
            const headRadius = 0.1;
            const headGeometry = new THREE.ConeGeometry(headRadius, headLength, 8);
            const headMaterial = new THREE.MeshBasicMaterial({ color: arrowColor });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            
            head.position.copy(arrowOrigin).add(arrowDir.clone().multiplyScalar(shaftLength + headLength / 2));
            head.quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 1, 0),
                arrowDir
            );
            dipoleArrow.add(head);
            
            // Create cross at base
            const crossSize = 0.2;
            const crossRadius = 0.04;
            
            let perp1 = new THREE.Vector3(1, 0, 0);
            if (Math.abs(arrowDir.dot(perp1)) > 0.9) {
                perp1 = new THREE.Vector3(0, 1, 0);
            }
            perp1.cross(arrowDir).normalize();
            const perp2 = new THREE.Vector3().crossVectors(arrowDir, perp1).normalize();
            
            const crossGeometry = new THREE.CylinderGeometry(crossRadius, crossRadius, crossSize, 8);
            const crossMaterial = new THREE.MeshBasicMaterial({ color: arrowColor });
            
            const crossBar1 = new THREE.Mesh(crossGeometry, crossMaterial);
            crossBar1.position.copy(arrowOrigin);
            crossBar1.quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 1, 0),
                perp1
            );
            dipoleArrow.add(crossBar1);
            
            const crossBar2 = new THREE.Mesh(crossGeometry, crossMaterial);
            crossBar2.position.copy(arrowOrigin);
            crossBar2.quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 1, 0),
                perp2
            );
            dipoleArrow.add(crossBar2);
            
            moleculeGroup.add(dipoleArrow);
        }

        function updateMolecule() {
            createMolecule();
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
