        const redScale = 1.10;
        const blueScale = 0.75;

        function init() {
            const container = document.getElementById('container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            
            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(3, 3, 5);
            camera.lookAt(0, 0, 0);
            initialCameraPos = camera.position.clone();
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            moleculeGroup = new THREE.Group();
            scene.add(moleculeGroup);
            initialMoleculeRot = moleculeGroup.rotation.clone();
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight1.position.set(5, 5, 5);
            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-5, -5, -5);
            scene.add(directionalLight2);
            
            const directionalLight3 = new THREE.DirectionalLight(0xffffff, 0.2);
            directionalLight3.position.set(0, -5, 0);
            scene.add(directionalLight3);
            
            const redMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const blueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });

            // Create red orbital
            if (orbitalData.red_mesh.vertices.length > 0) {
                const redGeometry = new THREE.BufferGeometry();
                const vertices = [];
                
                for (let i = 0; i < orbitalData.red_mesh.vertices.length; i++) {
                    const [x, y, z] = orbitalData.red_mesh.vertices[i];
                    vertices.push(x * redScale, y * redScale, z * redScale);
                }
                
                redGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                
                const indices = [];
                for (const face of orbitalData.red_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                redGeometry.setIndex(indices);
                redGeometry.computeVertexNormals();
                
                const redWireframe = new THREE.WireframeGeometry(redGeometry);
                const redOrbital = new THREE.LineSegments(redWireframe, redMaterial);
                moleculeGroup.add(redOrbital);
            }
            
            // Create blue orbital (identical mesh, different size and color)
            if (orbitalData.red_mesh.vertices.length > 0) {
                const blueGeometry = new THREE.BufferGeometry();
                const vertices = [];
                
                for (let i = 0; i < orbitalData.red_mesh.vertices.length; i++) {
                    const [x, y, z] = orbitalData.red_mesh.vertices[i];
                    vertices.push(x * blueScale, y * blueScale, z * blueScale);
                }
                
                blueGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                
                const indices = [];
                for (const face of orbitalData.red_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                blueGeometry.setIndex(indices);
                blueGeometry.computeVertexNormals();
                
                const blueWireframe = new THREE.WireframeGeometry(blueGeometry);
                const blueOrbital = new THREE.LineSegments(blueWireframe, blueMaterial);
                moleculeGroup.add(blueOrbital);
            }
            
            const atomGeometry = new THREE.SphereGeometry(0.42, 32, 32);
            const atomMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x606060,
                shininess: 30
            });
            const atom = new THREE.Mesh(atomGeometry, atomMaterial);
            moleculeGroup.add(atom);

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            animate();
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
