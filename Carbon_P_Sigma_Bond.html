// Multipliers for dynamic deformation
const l1StrMult=-0.4,l1SizMult=-0.4,l2StrMult=-0.2,l2SizMult=0.5,l3StrMult=-0.2,l3SizMult=0.5,l4StrMult=-0.4,l4SizMult=-0.4;

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);
camera=new THREE.PerspectiveCamera(45,338/330,0.1,1000);
camera.position.set(0,0,12);
camera.lookAt(0,0,0);
initCam=camera.position.clone();
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(338,330);
document.getElementById('container').appendChild(renderer.domElement);
mg=new THREE.Group();
scene.add(mg);
initRot=mg.rotation.clone();
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const d1=new THREE.DirectionalLight(0xffffff,0.6);
d1.position.set(5,5,5);
scene.add(d1);
const d2=new THREE.DirectionalLight(0xffffff,0.3);
d2.position.set(-5,-5,-5);
scene.add(d2);

c1grp=new THREE.Group();
c2grp=new THREE.Group();
mg.add(c1grp);
mg.add(c2grp);

buildMol();

document.getElementById('dslide').oninput=e=>{
dist=parseFloat(e.target.value);
document.getElementById('dval').textContent=dist.toFixed(2)+' Å';
buildMol();
};

const c=renderer.domElement;
c.onmousedown=e=>{dragging=true;prev={x:e.clientX,y:e.clientY}};
c.onmousemove=e=>{if(dragging){mg.rotation.y+=(e.clientX-prev.x)*0.01;mg.rotation.x+=(e.clientY-prev.y)*0.01;prev={x:e.clientX,y:e.clientY}}};
c.onmouseup=()=>dragging=false;
c.onmouseleave=()=>dragging=false;
c.onwheel=e=>{e.preventDefault();const d=new THREE.Vector3().sub(camera.position).normalize();camera.position.add(d.multiplyScalar(e.deltaY>0?-0.1:0.1))};
function anim(){requestAnimationFrame(anim);renderer.render(scene,camera)}
anim();
}

function buildMol(){
while(c1grp.children.length)c1grp.remove(c1grp.children[0]);
while(c2grp.children.length)c2grp.remove(c2grp.children[0]);
while(mg.children.length>2)mg.remove(mg.children[2]);

const halfDist=dist/2;
c1grp.position.x=-halfDist;
c2grp.position.x=halfDist;

const atomMat=new THREE.MeshPhongMaterial({color:0x606060,shininess:30});
c1grp.add(new THREE.Mesh(new THREE.SphereGeometry(0.42,32,32),atomMat));
c2grp.add(new THREE.Mesh(new THREE.SphereGeometry(0.42,32,32),atomMat));

const t=(5-dist)/(5-1.54);

const l1Str=1+l1StrMult*t;
const l1Siz=1+l1SizMult*t;
const l2Str=1+l2StrMult*t;
const l2Siz=1+l2SizMult*t;
const l3Str=1+l3StrMult*t;
const l3Siz=1+l3SizMult*t;
const l4Str=1+l4StrMult*t;
const l4Siz=1+l4SizMult*t;

mg.add(makeLobe(orbData.blue_mesh,0x0000ff,-halfDist,0,0,-1,l1Str,l1Siz));
mg.add(makeLobe(orbData.red_mesh,0xff0000,-halfDist,0,0,-1,l2Str,l2Siz));
mg.add(makeLobe(orbData.red_mesh,0xff0000,halfDist,0,0,1,l3Str,l3Siz));
mg.add(makeLobe(orbData.blue_mesh,0x0000ff,halfDist,0,0,1,l4Str,l4Siz));
}

function makeLobe(meshData,color,offX,offY,offZ,xFlip,str,siz){
const geo=new THREE.BufferGeometry();
const verts=[];
for(const v of meshData.vertices){
verts.push((v[0]*str*xFlip)+offX,(v[1]*siz)+offY,(v[2]*siz)+offZ);
}
geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
const idx=[];
for(const f of meshData.faces)idx.push(f[0],f[1],f[2]);
geo.setIndex(idx);
geo.computeVertexNormals();
const wf=new THREE.WireframeGeometry(geo);
return new THREE.LineSegments(wf,new THREE.LineBasicMaterial({color,transparent:true,opacity:0.6}));
}

function resetCamera(){camera.position.copy(initCam);camera.lookAt(0,0,0);mg.rotation.copy(initRot)}
function resetAll(){
dist=5;
document.getElementById('dslide').value=5;
document.getElementById('dval').textContent='5.00 Å';
buildMol();resetCamera();
}
init();
</script></body></html>
