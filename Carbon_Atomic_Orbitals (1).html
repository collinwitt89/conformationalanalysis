        const sRedScale = 1.10;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            
            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(3, 3, 5);
            camera.lookAt(0, 0, 0);
            initialCameraPos = camera.position.clone();
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            moleculeGroup = new THREE.Group();

            initialMoleculeRot = moleculeGroup.rotation.clone();

            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-5, -5, -5);
            scene.add(directionalLight2);
            
            const directionalLight3 = new THREE.DirectionalLight(0xffffff, 0.2);
            directionalLight3.position.set(0, -5, 0);
            scene.add(directionalLight3);
            
            const redMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const blueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });

            // Create 2s orbital - RED MESH (outer sphere, scaled 1.10)
            if (sOrbitalData.red_mesh.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                
                for (let i = 0; i < sOrbitalData.red_mesh.vertices.length; i++) {
                    const [x, y, z] = sOrbitalData.red_mesh.vertices[i];
                    vertices.push(x * sRedScale, y * sRedScale, z * sRedScale);
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                
                const indices = [];
                for (const face of sOrbitalData.red_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                s_redOrbital = new THREE.LineSegments(wireframe, redMaterial);
                moleculeGroup.add(s_redOrbital);
            }
            
            // Create 2s orbital - BLUE MESH (inner sphere, using RED_MESH data scaled 0.75)
            if (sOrbitalData.red_mesh.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                
                for (let i = 0; i < sOrbitalData.red_mesh.vertices.length; i++) {
                    const [x, y, z] = sOrbitalData.red_mesh.vertices[i];
                    vertices.push(x * sBlueScale, y * sBlueScale, z * sBlueScale);

                const wireframe = new THREE.WireframeGeometry(geometry);
                s_blueOrbital = new THREE.LineSegments(wireframe, blueMaterial);
                moleculeGroup.add(s_blueOrbital);
            }
            
            // Create 2px orbital - red mesh
            if (pxOrbitalData.red_mesh.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = new Float32Array(pxOrbitalData.red_mesh.vertices.flat());
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                
                const indices = [];
                for (const face of pxOrbitalData.red_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                px_redOrbital = new THREE.LineSegments(wireframe, redMaterial);
                moleculeGroup.add(px_redOrbital);
            }
            
            // Create 2px orbital - blue mesh
            if (pxOrbitalData.blue_mesh.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = new Float32Array(pxOrbitalData.blue_mesh.vertices.flat());
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                
                const indices = [];
                for (const face of pxOrbitalData.blue_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }

                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                px_blueOrbital = new THREE.LineSegments(wireframe, blueMaterial);
                moleculeGroup.add(px_blueOrbital);
            }
            
            // Create 2py orbital - red mesh
            if (pyOrbitalData.red_mesh.vertices.length > 0) {

                const vertices = new Float32Array(pyOrbitalData.red_mesh.vertices.flat());
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

                const vertices = new Float32Array(pyOrbitalData.blue_mesh.vertices.flat());

                for (const face of pyOrbitalData.blue_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                py_blueOrbital = new THREE.LineSegments(wireframe, blueMaterial);
                moleculeGroup.add(py_blueOrbital);
            }
            
            // Create 2pz orbital - red mesh
            if (pzOrbitalData.red_mesh.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = new Float32Array(pzOrbitalData.red_mesh.vertices.flat());
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

                moleculeGroup.add(pz_redOrbital);
            }

                const vertices = new Float32Array(pzOrbitalData.blue_mesh.vertices.flat());

                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                pz_blueOrbital = new THREE.LineSegments(wireframe, blueMaterial);
                moleculeGroup.add(pz_blueOrbital);
            }
            
            const atomGeometry = new THREE.SphereGeometry(0.42, 32, 32);
            const atomMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x606060,
                shininess: 30
            });
            const atom = new THREE.Mesh(atomGeometry, atomMaterial);
            moleculeGroup.add(atom);

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            animate();
        }

        function toggle2s() {
            show2s = !show2s;
            const button = document.getElementById('toggle-2s');
            
            if (show2s) {
                s_redOrbital.visible = true;
                s_blueOrbital.visible = true;
                button.classList.remove('inactive');
                button.classList.add('active');
            } else {
                s_redOrbital.visible = false;
                s_blueOrbital.visible = false;
                button.classList.remove('active');
                button.classList.add('inactive');

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
