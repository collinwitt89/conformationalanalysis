<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Carbonyl CF Dipole</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f5f5f5}
#container{width:338px;height:330px;border-radius:8px;position:relative;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.controls-bar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:10px 15px;background:rgba(255,255,255,0.95);border:1px solid #ccc;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:100}
input[type="range"]{width:150px;height:3px;background:#d0d0d0;outline:none;-webkit-appearance:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#000;cursor:pointer}
input[type="range"]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#000;cursor:pointer;border:none}
.angle-display{font-size:12px;color:#404040;min-width:35px}
.reset-btn{padding:4px 8px;background:#000;color:white;border:none;cursor:pointer;font-size:14px}
.reset-btn:hover{background:#333}
.dipole-display{position:absolute;top:10px;right:10px;padding:6px 10px;background:rgba(255,255,255,0.95);border:1px solid #ccc;border-radius:4px;font-size:12px;color:#404040;z-index:100}
</style></head><body>
<div id="container">
<div class="dipole-display" id="dd">μ: 1.00</div>
<div class="controls-bar">
<input type="range" id="slider" min="0" max="360" value="0">
<span class="angle-display" id="ad">0°</span>
<button class="reset-btn" onclick="resetCamera()">⌖</button>
</div></div>
<script>
let scene,camera,renderer,mg,dragging=false,prev={x:0,y:0},initCam,initRot,angle=0,arrow;
const molData={"atoms": [{"id": 1, "element": "C", "x": -1.2967, "y": -1.2437, "z": -0.0507}, {"id": 2, "element": "C", "x": 0.0, "y": -0.5, "z": 0.0}, {"id": 3, "element": "O", "x": -0.0, "y": 0.7234, "z": 0.0}, {"id": 4, "element": "O", "x": 1.1632, "y": -1.1973, "z": 0.0473}, {"id": 5, "element": "C", "x": 2.4094, "y": -0.6098, "z": 0.0967}, {"id": 6, "element": "H", "x": 2.5739, "y": 0.015599999999999947, "z": -0.8068}, {"id": 7, "element": "H", "x": 3.1846, "y": -1.4026, "z": 0.1286}, {"id": 8, "element": "H", "x": 2.5012, "y": 0.01739999999999997, "z": 1.0093}, {"id": 9, "element": "H", "x": -2.1541, "y": -0.5377, "z": -0.0811}, {"id": 10, "element": "H", "x": -1.3913, "y": -1.883, "z": 0.8515}, {"id": 11, "element": "F", "x": -1.3294, "y": -2.0404, "z": -1.1798}], "bonds": [{"atom1": 1, "atom2": 2, "type": 1}, {"atom1": 2, "atom2": 3, "type": 2}, {"atom1": 2, "atom2": 4, "type": 1}, {"atom1": 4, "atom2": 5, "type": 1}, {"atom1": 5, "atom2": 6, "type": 1}, {"atom1": 5, "atom2": 7, "type": 1}, {"atom1": 5, "atom2": 8, "type": 1}, {"atom1": 1, "atom2": 9, "type": 1}, {"atom1": 1, "atom2": 10, "type": 1}, {"atom1": 1, "atom2": 11, "type": 1}]};
const rotInfo={"c_carbonyl_id": 2, "c_cf_id": 1, "c_carbonyl_pos": [0.0, -0.5, 0.0], "c_cf_pos": [-1.2967, -1.2437, -0.0507], "rotating_ids": [9, 10, 11], "carbonyl_o_id": 3, "fluorine_id": 11};

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0xffffff);
camera=new THREE.PerspectiveCamera(45,338/330,0.1,1000);
camera.position.set(0,-0.3,11);
camera.lookAt(0,0,0);
initCam=camera.position.clone();
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(338,330);
document.getElementById('container').appendChild(renderer.domElement);
mg=new THREE.Group();
scene.add(mg);
initRot=mg.rotation.clone();
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const d1=new THREE.DirectionalLight(0xffffff,0.6);
d1.position.set(5,5,5);
scene.add(d1);
const d2=new THREE.DirectionalLight(0xffffff,0.3);
d2.position.set(-5,-5,-5);
scene.add(d2);
buildMol();
updateDip();
document.getElementById('slider').oninput=e=>{
angle=parseFloat(e.target.value);
document.getElementById('ad').textContent=Math.round(angle)+'°';
buildMol();updateDip();
};
const canv=renderer.domElement;
canv.onmousedown=e=>{dragging=true;prev={x:e.clientX,y:e.clientY}};
canv.onmousemove=e=>{if(dragging){mg.rotation.y+=(e.clientX-prev.x)*0.01;mg.rotation.x+=(e.clientY-prev.y)*0.01;prev={x:e.clientX,y:e.clientY}}};
canv.onmouseup=()=>dragging=false;
canv.onmouseleave=()=>dragging=false;
canv.onwheel=e=>{e.preventDefault();const d=new THREE.Vector3().sub(camera.position).normalize();camera.position.add(d.multiplyScalar(e.deltaY>0?-0.1:0.1))};
function anim(){requestAnimationFrame(anim);renderer.render(scene,camera)}
anim();
}

function getPos(){
const atoms=JSON.parse(JSON.stringify(molData.atoms));
const cfPos=new THREE.Vector3(...rotInfo.c_cf_pos);
const coPos=new THREE.Vector3(...rotInfo.c_carbonyl_pos);
const ax=new THREE.Vector3().subVectors(cfPos,coPos).normalize();
const rad=angle*Math.PI/180;
atoms.forEach(at=>{
if(rotInfo.rotating_ids.includes(at.id)){
const p=new THREE.Vector3(at.x,at.y,at.z);
p.sub(cfPos).applyAxisAngle(ax,rad).add(cfPos);
at.x=p.x;at.y=p.y;at.z=p.z;
}});
return atoms;
}

function buildMol(){
while(mg.children.length)mg.remove(mg.children[0]);
const atoms=getPos();
const pr={'C':{r:0.42,c:0x606060},'H':{r:0.30,c:0xe8e8e8},'O':{r:0.36,c:0xff0d0d},'F':{r:0.36,c:0x90e050}};
atoms.forEach(a=>{
const p=pr[a.element];
const s=new THREE.Mesh(new THREE.SphereGeometry(p.r,32,32),new THREE.MeshPhongMaterial({color:p.c,shininess:30}));
s.position.set(a.x,a.y,a.z);
mg.add(s);
});
molData.bonds.forEach(b=>{
const a1=atoms.find(a=>a.id===b.atom1),a2=atoms.find(a=>a.id===b.atom2);
const start=new THREE.Vector3(a1.x,a1.y,a1.z),end=new THREE.Vector3(a2.x,a2.y,a2.z);
const dir=new THREE.Vector3().subVectors(end,start),len=dir.length();
const cy=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,len,16),new THREE.MeshPhongMaterial({color:0x606060,shininess:30}));
cy.position.copy(start).add(dir.multiplyScalar(0.5));
cy.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
mg.add(cy);
});
}

function updateDip(){
if(arrow)mg.remove(arrow);
const atoms=getPos();
const cOxy=atoms.find(x=>x.id===3),carbC=atoms.find(x=>x.id===2),fluor=atoms.find(x=>x.id===11),cfCarb=atoms.find(x=>x.id===1),sOxy=atoms.find(x=>x.id===4);
const dip1=new THREE.Vector3(cOxy.x-carbC.x,cOxy.y-carbC.y,cOxy.z-carbC.z).normalize().multiplyScalar(1.67);
const dip2=new THREE.Vector3(fluor.x-cfCarb.x,fluor.y-cfCarb.y,fluor.z-cfCarb.z).normalize().multiplyScalar(1.0);
const dip3=new THREE.Vector3(sOxy.x-carbC.x,sOxy.y-carbC.y,sOxy.z-carbC.z).normalize().multiplyScalar(0.66);
const tot=new THREE.Vector3().addVectors(dip1,dip2).add(dip3);
const mag=tot.length();
document.getElementById('dd').textContent='μ: '+(mag/1.222).toFixed(2);
if(mag<0.01)return;
arrow=new THREE.Group();
const org=new THREE.Vector3(0,2.5,0),dr=tot.clone().normalize(),ln=mag*0.6;
const sh=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,ln*0.7,8),new THREE.MeshBasicMaterial({color:0xe74c3c}));
sh.position.copy(org).add(dr.clone().multiplyScalar(ln*0.35));
sh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dr);
arrow.add(sh);
const hd=new THREE.Mesh(new THREE.ConeGeometry(0.1,ln*0.3,8),new THREE.MeshBasicMaterial({color:0xe74c3c}));
hd.position.copy(org).add(dr.clone().multiplyScalar(ln*0.85));
hd.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dr);
arrow.add(hd);
let perp1=new THREE.Vector3(1,0,0);
if(Math.abs(dr.dot(perp1))>0.9)perp1=new THREE.Vector3(0,1,0);
perp1.cross(dr).normalize();
const perp2=new THREE.Vector3().crossVectors(dr,perp1).normalize();
const cg=new THREE.CylinderGeometry(0.04,0.04,0.2,8),cm=new THREE.MeshBasicMaterial({color:0xe74c3c});
const cross1=new THREE.Mesh(cg,cm);
cross1.position.copy(org);
cross1.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),perp1);
arrow.add(cross1);
const cross2=new THREE.Mesh(cg,cm);
cross2.position.copy(org);
cross2.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),perp2);
arrow.add(cross2);
mg.add(arrow);
}

function resetCamera(){camera.position.copy(initCam);camera.lookAt(0,0,0);mg.rotation.copy(initRot)}
init();
</script></body></html>
