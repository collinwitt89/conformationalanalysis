        .size-label {

            transform: scale(1.2);

            left: 50%;

            border: 1px solid #cccccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);

            align-items: center;

        }

            top: 0;
            left: 0;

            border-top: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            font-size: 10px;
        }
        .lobe-control {

            align-items: center;
            gap: 6px;
        }
        .lobe-control label {
            min-width: 50px;
            font-size: 10px;
        }
        .lobe-slider {

            height: 2px;
            -webkit-appearance: none;
            background: #d0d0d0;
            outline: none;
        }
        .lobe-slider::-webkit-slider-thumb {

            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
        }
        .lobe-slider::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
            border: none;
        }
        .lobe-value {
            min-width: 30px;
            font-size: 10px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #distanceSlider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: #d0d0d0;
            outline: none;
            border-radius: 0px;
        }
        #distanceSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #000000;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #distanceSlider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        #distanceSlider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #000000;
            cursor: pointer;
            border: none;
            transition: transform 0.1s;
        }
        #distanceSlider::-moz-range-thumb:hover {
            transform: scale(1.2);
        }
        #distanceValue {
            font-size: 11px;
            color: #404040;
            min-width: 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .reset-btn {
            background: #000000;
            color: white;
            border: none;
            border-radius: 0px;
            cursor: pointer;
            font-size: 13px;
            padding: 3px 6px;
            transition: background 0.2s;
        }
        .reset-btn:hover {
            background: #333333;
        }
        .toggle-btn {
            background: #000000;
            color: white;
            border: none;
            border-radius: 0px;
            cursor: pointer;
            font-size: 13px;
            padding: 3px 6px;
            transition: background 0.2s;
        }
        .toggle-btn:hover {
            background: #333333;
        }
        .toggle-btn.active {
            background: #444444;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

                const blueWireframe = new THREE.WireframeGeometry(blueGeometry);
                const blueMaterial = new THREE.LineBasicMaterial({
                    color: 0x0000ff,
                    transparent: true,
                    opacity: 0.60
                });
                const blueOrbital = new THREE.LineSegments(blueWireframe, blueMaterial);
                carbonGroup1.add(blueOrbital);
            }

            // Create second carbon group at x = -2.5
            carbonGroup2 = new THREE.Group();
            carbonGroup2.position.x = -2.5;
            carbonGroup2.rotation.z = Math.PI / 2 + Math.PI; // 90° + 180° = 270°
            moleculeGroup.add(carbonGroup2);

            // Create carbon atom 2
            const atomMaterial2 = new THREE.MeshPhongMaterial({ 
                color: 0x606060,
                shininess: 30
            });
            const atomGeometry2 = new THREE.SphereGeometry(0.42, 32, 32);
            const atom2 = new THREE.Mesh(atomGeometry2, atomMaterial2);
            atom2.position.set(0, 0, 0);
            carbonGroup2.add(atom2);

            // Create red orbital mesh 2 (positive)
            if (bondOrbitalData.red_mesh.vertices.length > 0) {
                const redGeometry2 = new THREE.BufferGeometry();
                const vertices2 = new Float32Array(bondOrbitalData.red_mesh.vertices.flat());
                redGeometry2.setAttribute('position', new THREE.BufferAttribute(vertices2, 3));
                
                const indices2 = [];
                for (const face of bondOrbitalData.red_mesh.faces) {
                    indices2.push(face[0], face[1], face[2]);
                }
                redGeometry2.setIndex(indices2);
                redGeometry2.computeVertexNormals();
                
                const redWireframe2 = new THREE.WireframeGeometry(redGeometry2);
                const redMaterial2 = new THREE.LineBasicMaterial({
                    color: 0xff0000,
                    transparent: true,
                    opacity: 0.60
                });
                const redOrbital2 = new THREE.LineSegments(redWireframe2, redMaterial2);
                carbonGroup2.add(redOrbital2);
            }

            // Create blue orbital mesh 2 (negative)
            if (bondOrbitalData.blue_mesh.vertices.length > 0) {
                const blueGeometry2 = new THREE.BufferGeometry();
                const vertices2 = new Float32Array(bondOrbitalData.blue_mesh.vertices.flat());
                blueGeometry2.setAttribute('position', new THREE.BufferAttribute(vertices2, 3));
                
                const indices2 = [];
                for (const face of bondOrbitalData.blue_mesh.faces) {
                    indices2.push(face[0], face[1], face[2]);
                }
                blueGeometry2.setIndex(indices2);
                blueGeometry2.computeVertexNormals();
                
                const blueWireframe2 = new THREE.WireframeGeometry(blueGeometry2);
                const blueMaterial2 = new THREE.LineBasicMaterial({
                    color: 0x0000ff,
                    transparent: true,
                    opacity: 0.60
                });
                const blueOrbital2 = new THREE.LineSegments(blueWireframe2, blueMaterial2);
                carbonGroup2.add(blueOrbital2);
            }

            // Mouse interaction
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            // Zoom
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            // Size slider (vertical)
            // Distance slider
            const distanceSlider = document.getElementById('distanceSlider');
            const distanceValue = document.getElementById('distanceValue');
            
            // Toggle buttons
            document.getElementById('piBtn').addEventListener('click', () => {
                if (currentMode !== 'bonding') {
                    currentMode = 'bonding';
                    document.getElementById('piBtn').classList.add('active');
                    document.getElementById('antiBtn').classList.remove('active');
                    updateDistance(parseFloat(distanceSlider.value));
                    if (typeof drawMODiagram === 'function') drawMODiagram();
                }
            });
            
            document.getElementById('antiBtn').addEventListener('click', () => {
                if (currentMode !== 'antibonding') {
                    currentMode = 'antibonding';
                    document.getElementById('antiBtn').classList.add('active');
                    document.getElementById('piBtn').classList.remove('active');
                    updateDistance(parseFloat(distanceSlider.value));
                    if (typeof drawMODiagram === 'function') drawMODiagram();
                }
            });
            
            distanceSlider.addEventListener('input', (e) => {
                const distance = parseFloat(e.target.value);
                updateDistance(distance);
                distanceValue.textContent = distance.toFixed(2) + ' Å';
                if (typeof drawMODiagram === 'function') drawMODiagram();
            });

            // Initialize orbitals at starting distance
            updateLobeSizes();
            updateDistance(initialDistance);

            animate();
        }

        function updateDistance(distance) {
            const halfDistance = distance / 2;
            carbonGroup1.position.x = halfDistance;
            carbonGroup2.position.x = -halfDistance;
            
            // Apply orbital deformation based on mode
            if (currentMode === 'bonding') {
                applyBondingDeformation(distance, halfDistance);
            } else {
                applyAntibondingDeformation(distance, halfDistance);
            }
        }

        function applyBondingDeformation(distance, halfDistance) {
            const orbitalData = currentMode === 'bonding' ? bondOrbitalData : antiOrbitalData;
            
            const stretchThreshold = 2.50;
            const minDistance = 1.34;
            const orbitalRadius = 0.75;
            
            // Calculate normalized distance for stretching
            let normalizedDist = 0;
            if (distance < stretchThreshold) {
                normalizedDist = Math.max(0, Math.min(1, 
                    (stretchThreshold - distance) / (stretchThreshold - minDistance)));
            }
            
            // Use dynamic stretch factor from slider
            const maxStretchFactor = bondStretchFactor;
            
            // Calculate electronegativity bulge for lobes 3 and 4 (right side)
            const enBulgeFactor = 1 + (electronegativity/100) * 0.3; // 1.0 to 1.3
            
            // Remove old orbitals from both groups
            while(carbonGroup1.children.length > 1) {
                carbonGroup1.remove(carbonGroup1.children[carbonGroup1.children.length - 1]);
            }
            while(carbonGroup2.children.length > 1) {
                carbonGroup2.remove(carbonGroup2.children[carbonGroup2.children.length - 1]);
            }
            
            // Helper function to create orbital mesh
            // For carbon at +halfDistance: stretch vertices with y < 0 (pointing toward origin/left)
            // For carbon at -halfDistance: stretch vertices with y > 0 (pointing toward origin/right)
            function createOrbitalMesh(meshData, carbonPosition, color, staticSize) {
                if (meshData.vertices.length === 0) return null;
                
                const geometry = new THREE.BufferGeometry();
                const newVertices = [];
                const vertexIndexMap = new Map();
                
                // Determine which hemisphere to stretch based on carbon position
                // Carbon at +halfDistance (right): inner hemisphere has y < 0
                // Carbon at -halfDistance (left): inner hemisphere has y > 0
                const isRightCarbon = carbonPosition > 0;
                
                // Process each vertex
                for (let i = 0; i < meshData.vertices.length; i++) {
                    let [x, y, z] = meshData.vertices[i];
                    
                    // Apply static size first
                    x = x * staticSize;
                    y = y * staticSize;
                    z = z * staticSize;
                    
                    // Only stretch the inner hemisphere that faces toward the origin
                    let shouldStretch = false;
                    if (isRightCarbon) {
                        // Right carbon: stretch left-facing hemisphere (y < 0 in orbital space)
                        shouldStretch = (y < 0);
                    } else {
                        // Left carbon: stretch right-facing hemisphere (y > 0 in orbital space)
                        shouldStretch = (y > 0);
                    }
                    
                    // Apply stretching only to inner hemisphere
                    if (distance < stretchThreshold && shouldStretch) {
                        const stretchCurve = Math.pow(normalizedDist, 1.5);
                        const stretchFactor = 1.0 + (stretchCurve * (maxStretchFactor - 1.0));
                        y = y * stretchFactor;
                    }
                    
                    // Transform to world coordinates for clipping check
                    // After 90° Z rotation: worldX = -y + offset, worldY = x
                    const worldX = -y + carbonPosition;
                    const worldY = x;
                    
                    // Determine other carbon's position
                    const otherCarbonPos = -carbonPosition;
                    
                    // Sphere-sphere clipping
                    const distToOther = Math.sqrt(
                        Math.pow(worldX - otherCarbonPos, 2) + 
                        Math.pow(worldY, 2) + 
                        Math.pow(z, 2)
                    );
                    
                    // Keep vertex only if outside other orbital
                    if (distToOther > orbitalRadius) {
                        vertexIndexMap.set(i, newVertices.length / 3);
                        newVertices.push(x, y, z);
                    }
                }
                
                if (newVertices.length === 0) return null;
                
                // Set vertex positions
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(newVertices), 3));
                
                // Rebuild faces
                const newIndices = [];
                for (const face of meshData.faces) {
                    const [i0, i1, i2] = face;
                    if (vertexIndexMap.has(i0) && vertexIndexMap.has(i1) && vertexIndexMap.has(i2)) {
                        newIndices.push(
                            vertexIndexMap.get(i0),
                            vertexIndexMap.get(i1),
                            vertexIndexMap.get(i2)
                        );
                    }
                }
                
                if (newIndices.length === 0) return null;
                
                geometry.setIndex(newIndices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                const material = new THREE.LineBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.60
                });
                
                return new THREE.LineSegments(wireframe, material);
            }
            
            // Create orbitals for right carbon (at +halfDistance)
            // Inner hemisphere: y < 0 (points left toward origin)
            const redOrbital1 = createOrbitalMesh(bondOrbitalData.red_mesh, halfDistance, 0x0000ff, lobe4StaticSize*enBulgeFactor);
            if (redOrbital1) carbonGroup1.add(redOrbital1);
            
            const blueOrbital1 = createOrbitalMesh(bondOrbitalData.blue_mesh, halfDistance, 0xff0000, lobe3StaticSize*enBulgeFactor);
            if (blueOrbital1) carbonGroup1.add(blueOrbital1);
            
            // Create orbitals for left carbon (at -halfDistance)
            // Inner hemisphere: y > 0 (points right toward origin)
            const redOrbital2 = createOrbitalMesh(bondOrbitalData.red_mesh, -halfDistance, 0x0000ff, lobe2StaticSize);
            if (redOrbital2) carbonGroup2.add(redOrbital2);
            
            const blueOrbital2 = createOrbitalMesh(bondOrbitalData.blue_mesh, -halfDistance, 0xff0000, lobe1StaticSize);
            if (blueOrbital2) carbonGroup2.add(blueOrbital2);
        }

        function applyAntibondingDeformation(distance, halfDistance) {
            const flattenThreshold = 1.65; // Start flattening at this distance
            const minDistance = 1.34;
            const orbitalRadius = 0.75;

// Calculate electronegativity bulge factors for pi*
const enBulgeLeft = 1 + (electronegativity/100) * 0.3; // Lobes 1&2: 1.0 to 1.3
const enBulgeRight = 1 + (electronegativity/100) * (-0.3); // Lobes 3&4: 1.0 to 0.7
            const nodeBuffer = 0.03; // Half of 0.06 Å nodal plane thickness
            
            // Calculate normalized distance for flattening
            let normalizedDist = 0;
            if (distance < flattenThreshold) {
                normalizedDist = Math.max(0, Math.min(1, 
                    (flattenThreshold - distance) / (flattenThreshold - minDistance)));
            }
            
            // Maximum compression factor for flattening
            const maxCompressionFactor = antiFlattenFactor; // Use dynamic value from slider
            
            // Remove old orbitals from both groups
            while(carbonGroup1.children.length > 1) {
                carbonGroup1.remove(carbonGroup1.children[carbonGroup1.children.length - 1]);
            }
            while(carbonGroup2.children.length > 1) {
                carbonGroup2.remove(carbonGroup2.children[carbonGroup2.children.length - 1]);
            }
            
            // Helper function to create orbital mesh with antibonding behavior
            function createOrbitalMesh(meshData, carbonPosition, color, staticSize) {
                if (meshData.vertices.length === 0) return null;
                
                const geometry = new THREE.BufferGeometry();
                const newVertices = [];
                const vertexIndexMap = new Map();
                
                // Determine which hemisphere to flatten based on carbon position
                const isRightCarbon = carbonPosition > 0;
                
                // Process each vertex
                for (let i = 0; i < meshData.vertices.length; i++) {
                    let [x, y, z] = meshData.vertices[i];
                    
                    // Apply static size first
                    x = x * staticSize;
                    y = y * staticSize;
                    z = z * staticSize;
                    
                    // Determine if this vertex is on the inner hemisphere (facing nodal plane)
                    let shouldFlatten = false;
                    let shouldStretch = false;
                    
                    if (isRightCarbon) {
                        // Right carbon: flatten left-facing hemisphere (y < 0 in orbital space)
                        shouldFlatten = (y < 0);
                        // Right carbon: stretch right-facing hemisphere (y > 0 in orbital space)
                        shouldStretch = (y > 0);
                    } else {
                        // Left carbon: flatten right-facing hemisphere (y > 0 in orbital space)
                        shouldFlatten = (y > 0);
                        // Left carbon: stretch left-facing hemisphere (y < 0 in orbital space)
                        shouldStretch = (y < 0);
                    }
                    
                    // Apply flattening (compression) to inner hemisphere
                    if (distance < flattenThreshold && shouldFlatten) {
                        const flattenCurve = Math.pow(normalizedDist, 2); // Quadratic for gentler flattening
                        const compressionFactor = 1.0 - (flattenCurve * (1.0 - maxCompressionFactor));
                        y = y * compressionFactor; // Compress toward the carbon atom
                    }
                    
                    // Apply dynamic outward stretching to outer hemisphere
                    // Stretches more as distance decreases, controlled by stretch factor slider
                    if (distance < flattenThreshold && shouldStretch && antiStretchFactor > 1.0) {
                        const stretchCurve = Math.pow(normalizedDist, 2); // Same curve as flattening
                        const stretchAmount = 1.0 + (stretchCurve * (antiStretchFactor - 1.0));
                        y = y * stretchAmount; // Stretch outward
                    }
                    
                    // Transform to world coordinates
                    // After 270° Z rotation: x_world = y_orbital, y_world = -x_orbital
                    let worldX = y + carbonPosition;
                    
                    // Nodal plane boundary constraint - strictly enforce ±0.03 Å
                    // Only clamp vertices that would naturally cross the boundary
                    if (isRightCarbon) {
                        // Right carbon: constrain to X >= nodeBuffer (0.03)
                        if (worldX < nodeBuffer) {
                            worldX = nodeBuffer;
                            y = worldX - carbonPosition;
                        }
                    } else {
                        // Left carbon: constrain to X <= -nodeBuffer (-0.03)
                        if (worldX > -nodeBuffer) {
                            worldX = -nodeBuffer;
                            y = worldX - carbonPosition;
                        }
                    }
                    
                    // Always keep the vertex
                    vertexIndexMap.set(i, newVertices.length / 3);
                    newVertices.push(x, y, z);
                }
                
                if (newVertices.length === 0) return null;
                
                // Set vertex positions
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(newVertices), 3));
                
                // Rebuild faces
                const newIndices = [];
                for (const face of meshData.faces) {
                    const [i0, i1, i2] = face;
                    if (vertexIndexMap.has(i0) && vertexIndexMap.has(i1) && vertexIndexMap.has(i2)) {
                        newIndices.push(
                            vertexIndexMap.get(i0),
                            vertexIndexMap.get(i1),
                            vertexIndexMap.get(i2)
                        );
                    }
                }
                
                if (newIndices.length === 0) return null;
                
                geometry.setIndex(newIndices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                const material = new THREE.LineBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.60
                });
                
                return new THREE.LineSegments(wireframe, material);
            }
            
            // Create orbitals for right carbon (at +halfDistance)
            // Blue on top, red on bottom
            const redOrbital1 = createOrbitalMesh(antiOrbitalData.red_mesh, halfDistance, 0x0000ff, lobe4StaticSize*enBulgeRight);
            if (redOrbital1) carbonGroup1.add(redOrbital1);
            
            const blueOrbital1 = createOrbitalMesh(antiOrbitalData.blue_mesh, halfDistance, 0xff0000, lobe3StaticSize*enBulgeRight);
            if (blueOrbital1) carbonGroup1.add(blueOrbital1);
            
            // Create orbitals for left carbon (at -halfDistance)
            // Red on top, blue on bottom (opposite phase)
            const redOrbital2 = createOrbitalMesh(antiOrbitalData.red_mesh, -halfDistance, 0xff0000, lobe2StaticSize*enBulgeLeft);
            if (redOrbital2) carbonGroup2.add(redOrbital2);
            
            const blueOrbital2 = createOrbitalMesh(antiOrbitalData.blue_mesh, -halfDistance, 0x0000ff, lobe1StaticSize*enBulgeLeft);
            if (blueOrbital2) carbonGroup2.add(blueOrbital2);
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function resetAll() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
            
            const distanceSlider = document.getElementById('distanceSlider');
            const distanceValue = document.getElementById('distanceValue');
            distanceSlider.value = initialDistance;
            distanceValue.textContent = initialDistance.toFixed(2) + ' Å';
            updateDistance(initialDistance);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        let moCanvas, ctx;
        function initMODiagram() {
            moCanvas = document.getElementById('moDiagram');
            ctx = moCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            moCanvas.width = 300 * dpr;
            moCanvas.height = 330 * dpr;
            ctx.scale(dpr, dpr);
            drawMODiagram();
        }
        
        function drawMODiagram() {
            const dist = parseFloat(document.getElementById('distanceSlider').value);
            ctx.clearRect(0, 0, 300, 330);
            const w = 300, h = 330, centerY = h / 2, atomX = 40, moX = 150;
            const enShift = (electronegativity/100) * 25;
            const leftAtomY = centerY - enShift;
            const rightAtomY = centerY + enShift;
            const minD = 1.34, maxD = 5.0;
            
            // Maximum split depends on size slider: 80 (slider at 0) to 10 (slider at 1)
            const maxSplit = 80 - (sizeSliderValue * 70); // 80 -> 10
            
            let split = 0;
            if (dist < maxD && dist > minD) split = maxSplit * Math.exp(-1.8 * (dist - minD));
            else if (dist <= minD) split = maxSplit;
            const enSplitFactor = 1 + (1 - electronegativity/100) * 0.5;
            const adjustedSplit = split * enSplitFactor;
            const bondingY = centerY + adjustedSplit, antiY = centerY - adjustedSplit;
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(20, 50);
            ctx.lineTo(20, h - 50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(20, 50);
            ctx.lineTo(17, 58);
            ctx.moveTo(20, 50);
            ctx.lineTo(23, 58);
            ctx.stroke();
            ctx.save();
            ctx.translate(10, centerY);
            ctx.rotate(-Math.PI / 2);
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.font = '12px Arial';
            ctx.fillText('Energy', 0, 0);
            ctx.restore();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = '#000';
            ctx.beginPath();
            ctx.moveTo(atomX - 15, leftAtomY);
            ctx.lineTo(atomX + 15, leftAtomY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - atomX - 15, rightAtomY);
            ctx.lineTo(w - atomX + 15, rightAtomY);
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.font = '11px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('2p', atomX, leftAtomY - 10);
            ctx.fillText('2p', w - atomX, rightAtomY - 10);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(moX - 20, bondingY);
            ctx.lineTo(moX + 20, bondingY);
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.fillText('π', moX, bondingY + 15);
            ctx.beginPath();
            ctx.moveTo(moX - 20, antiY);
            ctx.lineTo(moX + 20, antiY);
            ctx.stroke();
            ctx.fillText('π*', moX, antiY - 10);
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(atomX + 15, leftAtomY);
            ctx.lineTo(moX - 20, bondingY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(atomX + 15, leftAtomY);
            ctx.lineTo(moX - 20, antiY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - atomX - 15, rightAtomY);
            ctx.lineTo(moX + 20, bondingY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - atomX - 15, rightAtomY);
            ctx.lineTo(moX + 20, antiY);
            ctx.stroke();
            ctx.setLineDash([]);
            function drawHalfArrow(x, y, up, flipBarb) {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                const barbDir = flipBarb ? -3 : 3;
                if (up) {
                    ctx.beginPath();
                    ctx.moveTo(x, y + 10);
                    ctx.lineTo(x, y - 10);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x, y - 10);
                    ctx.lineTo(x + barbDir, y - 7);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(x, y - 10);
                    ctx.lineTo(x, y + 10);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x, y + 10);
                    ctx.lineTo(x + barbDir, y + 7);
                    ctx.stroke();
                }
            }
            drawHalfArrow(atomX, leftAtomY, true, false);
            drawHalfArrow(w - atomX, rightAtomY, true, false);
            drawHalfArrow(moX - 5, bondingY, false, true);
            drawHalfArrow(moX + 5, bondingY, true, false);
        }

        
function updateAtom2Color(){
const t=electronegativity/100;
let r,g,b;
if(t<0.5){
const localT=t*2;
r=Math.round(0x60+(0xff-0x60)*localT);
g=Math.round(0x60*(1-localT));
b=Math.round(0x60*(1-localT));
}else{
const localT=(t-0.5)*2;
r=Math.round(0xff);
g=Math.round(0x00+(0xa5-0x00)*localT);
b=Math.round(0x00);
}
const color=(r<<16)|(g<<8)|b;
c2Atom.material.color.setHex(color);
}

init();
        initMODiagram();
    

document.getElementById('enSlider').addEventListener('input',e=>{
electronegativity=parseFloat(e.target.value);
updateAtom2Color();
const currentDist = parseFloat(document.getElementById('distanceSlider').value);
updateDistance(currentDist);
drawMODiagram();
updateDistance(currentDist);
});
