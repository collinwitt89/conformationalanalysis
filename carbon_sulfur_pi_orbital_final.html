                    vertices.push(newX, newY, newZ);
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                
                const indices = [];
                for (const face of orbData.red_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                const outerLobeTop = new THREE.LineSegments(wireframe, topMat);
                targetGroup.add(outerLobeTop);
            }
            
            // Create outer bottom lobe with bottomMat (now blue)
            if (orbData.blue_mesh.vertices.length > 0) {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                
                const yValues = orbData.blue_mesh.vertices.map(v => v[1] * outerStretchScale);
                const minY = Math.min(...yValues);
                const maxY = Math.max(...yValues);
                const centerY = (minY + maxY) / 2;
                
                for (let i = 0; i < orbData.blue_mesh.vertices.length; i++) {
                    const [x, y, z] = orbData.blue_mesh.vertices[i];
                    
                    let newX = x * outerBulgeScale;
                    let newY = y * outerStretchScale;
                    let newZ = z * outerBulgeScale;
                    
                    // Apply donutification
                    const yRelativeToCenter = newY - centerY;
                    if (yRelativeToCenter > 0) {
                        const radialDist = Math.sqrt(newX * newX + newZ * newZ);
                        const maxRadial = Math.max(...orbData.blue_mesh.vertices.map(v => {
                            const rx = v[0] * outerBulgeScale;
                            const rz = v[2] * outerBulgeScale;
                            return Math.sqrt(rx * rx + rz * rz);
                        }));
                        
                        const radialFactor = maxRadial > 0 ? (1 - (radialDist / maxRadial)) : 0;
                        const yExtent = Math.abs(maxY - centerY);
                        const yFactor = yExtent > 0 ? Math.abs(yRelativeToCenter) / yExtent : 0;
                        const pushFactor = radialFactor * yFactor;
                        
                        newY -= donutValue * pushFactor;
                    }
                    
                    newY -= squeezeValue;
                    vertices.push(newX, newY, newZ);
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                
                const indices = [];
                for (const face of orbData.blue_mesh.faces) {
                    indices.push(face[0], face[1], face[2]);
                }
                geometry.setIndex(indices);
                geometry.computeVertexNormals();
                
                const wireframe = new THREE.WireframeGeometry(geometry);
                const outerLobeBottom = new THREE.LineSegments(wireframe, bottomMat);
                targetGroup.add(outerLobeBottom);
            }
        }

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // Camera
            camera = new THREE.PerspectiveCamera(45, 338 / 330, 0.1, 1000);
            camera.position.set(0, 0, 8);
            camera.lookAt(0, 0, 0);
            initialCameraPos = camera.position.clone();

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(338, 330);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight1.position.set(5, 5, 5);
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-5, -5, -5);
            scene.add(directionalLight2);

            // Molecule group
            moleculeGroup = new THREE.Group();
            scene.add(moleculeGroup);
            initialMoleculeRot = new THREE.Euler(0, 0, 0);
            initialDistance = 5.00;

            // Create first carbon group at x = 2.5
            carbonGroup1 = new THREE.Group();
            carbonGroup1.position.x = 2.5;
            carbonGroup1.rotation.z = Math.PI; // 180° (was 270°, now -90° = 180°)
            moleculeGroup.add(carbonGroup1);

            // Create sulfur atom 1
            const atomMaterial1 = new THREE.MeshPhongMaterial({ 
                color: 0xffff30,
                shininess: 30
            });
            const atomGeometry1 = new THREE.SphereGeometry(0.60, 32, 32);
            const atom1 = new THREE.Mesh(atomGeometry1, atomMaterial1);
            atom1.position.set(0, 0, 0);
            carbonGroup1.add(atom1);

            // Create second carbon group at x = -2.5
            carbonGroup2 = new THREE.Group();
            carbonGroup2.position.x = -2.5;
            carbonGroup2.rotation.z = Math.PI / 2 + Math.PI; // 90° + 180° = 270°
            moleculeGroup.add(carbonGroup2);

            // Create carbon atom 2
            const atomMaterial2 = new THREE.MeshPhongMaterial({ 
                color: 0x606060,
                shininess: 30
            });
            const atomGeometry2 = new THREE.SphereGeometry(0.42, 32, 32);
            const atom2 = new THREE.Mesh(atomGeometry2, atomMaterial2);
            atom2.position.set(0, 0, 0);
            carbonGroup2.add(atom2);

            // Mouse interaction
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    moleculeGroup.rotation.y += deltaX * 0.01;
                    moleculeGroup.rotation.x += deltaY * 0.01;
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            // Zoom
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                const direction = new THREE.Vector3(0, 0, 0).sub(camera.position).normalize();
                camera.position.add(direction.multiplyScalar(e.deltaY > 0 ? -zoomSpeed : zoomSpeed));
            });

            // Distance slider
            const distanceSlider = document.getElementById('distanceSlider');
            const distanceValue = document.getElementById('distanceValue');
            
            distanceSlider.addEventListener('input', (e) => {
                const distance = parseFloat(e.target.value);
                updateDistance(distance);
                distanceValue.textContent = distance.toFixed(2) + ' Å';
            });

            // Initialize orbitals at starting distance
            updateDistance(initialDistance);

            animate();
        }

        function updateDistance(distance) {
            const halfDistance = distance / 2;
            carbonGroup1.position.x = halfDistance;
            carbonGroup2.position.x = -halfDistance;
            
            // Calculate deformation amount based on distance
            let deformAmount = 0;
            if (distance < deformStartDistance) {
                deformAmount = Math.max(0, Math.min(1, 
                    (deformStartDistance - distance) / (deformStartDistance - deformEndDistance)));
            }
            
            // Rebuild all orbitals with deformation
            rebuildOrbitals(deformAmount);
        }
        
        function rebuildOrbitals(deformAmount) {
            // Clear existing orbitals (keep atoms)
            while(carbonGroup1.children.length > 1) {
                carbonGroup1.remove(carbonGroup1.children[carbonGroup1.children.length - 1]);
            }
            while(carbonGroup2.children.length > 1) {
                carbonGroup2.remove(carbonGroup2.children[carbonGroup2.children.length - 1]);
            }
            
            // Materials
            const sulfurRedMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const sulfurBlueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });
            
            // Rebuild sulfur 3p orbital (4 lobes) with deformation
            createLobeInGroupWithDeform(carbonGroup1, sulfurOrbitalData.red_mesh, 0, innerBulgeScale, innerStretchScale, sulfurBlueMaterial, lobe3StretchFactor, deformAmount);
            createLobeInGroupWithDeform(carbonGroup1, sulfurOrbitalData.blue_mesh, 0, innerBulgeScale, innerStretchScale, sulfurRedMaterial, lobe3StretchFactor, deformAmount);
            createOuterLobesInGroupWithDeform(carbonGroup1, sulfurOrbitalData, sulfurRedMaterial, sulfurBlueMaterial, lobe2StretchFactor, deformAmount);
            
            // Rebuild carbon 2p orbital with deformation
            const carbonRedMaterial = new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.60
            });
            
            const carbonBlueMaterial = new THREE.LineBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.60
            });
            
            createCarbonOrbitalWithDeform(carbonGroup2, carbonOrbitalData.red_mesh, carbonRedMaterial, lobe1StretchFactor, nucleusStretchFactor, deformAmount);
            createCarbonOrbitalWithDeform(carbonGroup2, carbonOrbitalData.blue_mesh, carbonBlueMaterial, lobe1StretchFactor, nucleusStretchFactor, deformAmount);
        }

        

        // Create carbon 2p orbital with X-axis deformation
        function createCarbonOrbitalWithDeform(targetGroup, meshData, material, stretchFactor, nucleusStretchFactor, deformAmount) {
            if (meshData.vertices.length === 0) return;
            
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            
            // Calculate effective stretches
            const effectiveXStretch = 1.0 + (stretchFactor - 1.0) * deformAmount;
            const effectiveNucleusStretch = 1.0 + (nucleusStretchFactor - 1.0) * deformAmount;
            
            // Find the extent of the inner hemisphere (y > 0) to determine 33% cutoff
            const innerHemisphereYValues = meshData.vertices.filter(v => v[1] > 0).map(v => v[1]);
            const maxYInner = Math.max(...innerHemisphereYValues);
            const nucleus33PercentY = maxYInner * 0.33; // First 33% from nucleus (y = 0 to 33% of max)
            
            for (let i = 0; i < meshData.vertices.length; i++) {
                let [x, y, z] = meshData.vertices[i];
                
                // Carbon is at -halfDistance (left side), rotated 270° around Z
                // After 270° rotation: original y becomes world x
                // Inner hemisphere points toward origin (y > 0 in orbital space)
                if (y > 0) {
                    // Inner hemisphere - determine if in nucleus region
                    if (y <= nucleus33PercentY) {
                        // Nucleus region (closest 33% to carbon atom) - apply nucleus stretch
                        y = y * effectiveNucleusStretch;
                    } else {
                        // Outer portion of inner hemisphere - apply main lobe stretch
                        y = y * effectiveXStretch;
                    }
                }
                
                vertices.push(x, y, z);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            
            const indices = [];
            for (const face of meshData.faces) {
                indices.push(face[0], face[1], face[2]);
            }
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            
            const wireframe = new THREE.WireframeGeometry(geometry);
            const orbital = new THREE.LineSegments(wireframe, material);
            targetGroup.add(orbital);
        }

        function resetCamera() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
        }

        function resetAll() {
            camera.position.copy(initialCameraPos);
            camera.lookAt(0, 0, 0);
            moleculeGroup.rotation.copy(initialMoleculeRot);
            
            const distanceSlider = document.getElementById('distanceSlider');
            const distanceValue = document.getElementById('distanceValue');
            distanceSlider.value = initialDistance;
            distanceValue.textContent = initialDistance.toFixed(2) + ' Å';
            
            updateDistance(initialDistance);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
